name: Sync to Vercel repo
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Debug Token Owner
        run: |
          curl -I -H "Authorization: token ${{ secrets.VERCEL_SYNC_TOKEN }}" https://api.github.com/user
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Vercel-connected repo
        run: |
          git push --force https://${{ secrets.VERCEL_SYNC_TOKEN }}@github.com/nguyenducthanh265/fivelittlepigsss.git main

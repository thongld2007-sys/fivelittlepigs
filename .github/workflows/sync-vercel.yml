name: Sync to Vercel repo
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Vercel-connected repo
        run: |
          CLEAN_TOKEN=$(echo "${{ secrets.VERCEL_SYNC_TOKEN }}" | tr -d '\r\n[:space:]')
          git push --force "https://nguyenducthanh265:${CLEAN_TOKEN}@github.com/nguyenducthanh265/fivelittlepigsss.git" main
